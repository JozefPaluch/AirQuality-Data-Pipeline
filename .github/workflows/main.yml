name: Codzienny Pobór Danych

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-etl-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Pobieranie repozytorium
        uses: actions/checkout@v3

      - name: Instalacja Pythona
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalacja bibliotek
        run: |
          pip install pandas requests psycopg2-binary

      - name: Uruchomienie skryptu ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pogoda_etl.py
